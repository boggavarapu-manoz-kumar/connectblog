<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ConnectBlog - A modern social platform for developers and creatives to share their thoughts and connect." />
  <meta name="keywords" content="blog, social media, developers, networking, connectblog" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Playfair+Display:ital,wght@0,700;1,700;1,800;1,900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://connectblog.site/" />
  <meta property="og:title" content="ConnectBlog | Share. Connect. Grow." />
  <meta property="og:description" content="ConnectBlog - A modern social platform for developers and creatives to share their thoughts and connect." />
  <meta property="og:site_name" content="ConnectBlog" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://connectblog.site/" />
  <meta property="twitter:title" content="ConnectBlog | Share. Connect. Grow." />
  <meta property="twitter:description" content="ConnectBlog - A modern social platform for developers and creatives to share their thoughts and connect." />

  <!-- Canonical Base -->
  <link rel="canonical" href="https://connectblog.site/" />

  <!-- Organization JSON-LD -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ConnectBlog",
      "url": "https://connectblog.site/",
      "description": "A modern social platform for developers and creatives.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://connectblog.site/explore?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
  </script>

  <title>ConnectBlog | Share. Connect. Grow.</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
